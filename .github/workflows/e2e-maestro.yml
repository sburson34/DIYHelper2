name: E2E (Maestro)

# Manual-dispatch only. Android emulators on GitHub-hosted runners take
# 10–20 min to boot and are prone to unrelated failures, so we don't gate
# PRs on this. Run before cutting a release or when touching navigation
# / screen-mount paths.
#
# Required secrets:
#   None for the offline flows (smoke-launch, drawer-navigation,
#   settings-theme). The "golden-path" flow needs the deployed backend
#   or a locally proxied one — it's tagged and runs only when
#   `run_golden_path=true` is set.

on:
  workflow_dispatch:
    inputs:
      run_golden_path:
        description: 'Also run describe-analyze-save (requires live backend)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  maestro:
    name: Maestro (Android emulator)
    # Android emulators run dramatically more reliably on macOS runners
    # (hardware acceleration available out of the box). Linux runners
    # require KVM, which GitHub-hosted doesn't provide.
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Build a debug APK — Maestro installs via `adb install`, so we need
      # a concrete APK on disk. Release would work too but costs extra
      # signing setup.
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/**/*.gradle*', 'app/android/**/gradle-wrapper.properties') }}

      - name: Build debug APK
        working-directory: app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Start emulator + run offline flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb install -r app/android/app/build/outputs/apk/debug/app-debug.apk
            cd app
            # These three flows don't need a live backend.
            maestro test maestro/smoke-launch.yaml
            maestro test maestro/drawer-navigation.yaml
            maestro test maestro/settings-theme.yaml

      - name: Run golden-path (optional, needs live backend)
        if: ${{ inputs.run_golden_path == 'true' }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            cd app
            maestro test maestro/describe-analyze-save.yaml

      - name: Upload Maestro debug output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: |
            ~/.maestro/tests/**/*
          if-no-files-found: ignore
          retention-days: 14
