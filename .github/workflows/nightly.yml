name: Nightly extended

# Extended suite. Runs once per night on main. Intended for checks that are
# too slow or too flaky-prone to run on every push — flaky detection via
# repeat runs, dependency drift check, and a publish-deploy dry run.

on:
  schedule:
    # 07:00 UTC = 03:00 ET, outside normal working hours.
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  flaky-detect-frontend:
    name: Flaky detect (Jest x3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Run Jest 3 times in a row
        # A single flake can be masked by retry-on-fail runners. Running the
        # same suite back-to-back in one job exposes tests that depend on
        # ordering, stale globals, or timer races.
        run: |
          for i in 1 2 3; do
            echo "=== Jest run #$i ==="
            npm test -- --ci || exit 1
          done

  flaky-detect-backend:
    name: Flaky detect (xUnit x3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - run: dotnet restore DIYHelper2.slnx

      - name: Run xUnit 3 times in a row
        run: |
          for i in 1 2 3; do
            echo "=== xUnit run #$i ==="
            dotnet test DIYHelper2.slnx --logger "console;verbosity=minimal" || exit 1
          done
